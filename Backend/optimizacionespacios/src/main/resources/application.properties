# DESARROLLO - H2 (base de datos en memoria, sin instalar nada)
# Los datos se reinician cada vez que reinicias el servidor.

spring.datasource.url=jdbc:h2:mem:campusalert;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Consola visual H2 - abrir en http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Archivos (fotos/videos)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
app.upload.dir=uploads/evidencias

# CORS - permite peticiones desde React
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Puerto
server.port=8081


